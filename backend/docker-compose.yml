services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opmwiki}
      POSTGRES_USER: ${POSTGRES_USER:-opmwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opmwiki}
    ports:
      - "5432:5432"
    volumes:
      - opmwiki-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opmwiki} -d ${POSTGRES_DB:-opmwiki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/OpmWiki.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OpmWiki: Host=database;Port=5432;Database=${POSTGRES_DB:-opmwiki};Username=${POSTGRES_USER:-opmwiki};Password=${POSTGRES_PASSWORD:-opmwiki}
      Database__MigrateOnStartup: "true"
      SeedData__FrontendDataPath: /frontend-data
      AdminAuth__Username: ${ADMIN_USERNAME:-admin}
      AdminAuth__Password: ${ADMIN_PASSWORD:-dev-only-change-me}
      AdminAuth__JwtSigningKey: ${ADMIN_JWT_SIGNING_KEY:-development-only-opmwiki-admin-signing-key-change-me}
      AiAdvisor__Enabled: ${AI_ADVISOR_ENABLED:-false}
      AiAdvisor__Endpoint: ${AI_ADVISOR_ENDPOINT:-}
      AiAdvisor__ApiKey: ${AI_ADVISOR_API_KEY:-}
      AiAdvisor__Model: ${AI_ADVISOR_MODEL:-}
    ports:
      - "5180:8080"
    volumes:
      - ../src/data:/frontend-data:ro
    depends_on:
      database:
        condition: service_healthy

volumes:
  opmwiki-postgres:
